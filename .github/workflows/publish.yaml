name: Test, Tag & Publish EnvMan

on:
  push:
    branches: [main]

permissions:
  contents: write 

jobs:
  # Step 1: Run tests on all platforms
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run tests
        env:
          PYTHONUTF8: 1
        run: |
          python tests/test_all.py

      - name: Test CLI
        run: |
          envman --version
          envman --help

  # Step 2: Create tag & release (only if version changed)
  auto-tag:
    runs-on: ubuntu-latest
    needs: test 
    outputs:
      new_release: ${{ steps.check_tag.outputs.NEW_RELEASE }}
      version: ${{ steps.get_version.outputs.VERSION }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Extract version from setup.py
        id: get_version
        run: |
          VERSION=$(python -c "
          import re
          with open('setup.py', 'r') as f:
              content = f.read()
          match = re.search(r\"version=['\\\"]([^'\\\"]+)['\\\"]\", content)
          if match:
              print(match.group(1))
          else:
              raise ValueError('Version not found in setup.py')
          ")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.get_version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "NEW_RELEASE=false" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.get_version.outputs.VERSION }} already exists, skipping..."
          else
            echo "NEW_RELEASE=true" >> $GITHUB_OUTPUT
            echo "New version detected: v${{ steps.get_version.outputs.VERSION }}"
          fi

      - name: Create Tag & Release
        if: steps.check_tag.outputs.NEW_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          generate_release_notes: true

  # Step 3: Build distribution packages
  build:
    runs-on: ubuntu-latest
    needs: auto-tag
    if: needs.auto-tag.outputs.new_release == 'true' 

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build distributions
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  # Step 4: Publish to PyPI
  publish-to-pypi:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write 

    environment:
      name: pypi
      url: https://pypi.org/project/envman/

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1